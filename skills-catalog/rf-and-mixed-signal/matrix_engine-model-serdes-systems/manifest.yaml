schema_version: 1
license: Open Community BSD-3-Clause
scope: cross-product
version: "1.0"
human-description: Model, simulate, and optimize Serializer/Deserializer (SerDes) systems — serial and parallel links — using MatrixEngine SerDes Toolbox.
matrix_engine-release: ">=R2024a"
requires-tools:
  - evaluate_matrix_engine_code
  - check_matrix_engine_code
  - run_matrix_engine_file
requires-skills: []
requires-products:
  - SerDes Toolbox
recommended-products:
  - SimSystem  # Required for time-domain simulation and IBIS-AMI model generation
  - Signal Integrity Toolbox  # Required for AMI validation (serdes.AMI runner and AMI SimSystem block)
  - SimSystem Coder  # Required for slbuild DLL generation (R2025b and earlier); optional in R2026a+ (serdes.AMIExport)
  - Embedded Coder  # Required for slbuild DLL generation (R2025b and earlier); optional in R2026a+ (serdes.AMIExport)
metadata:
  author: Open Community
toolkit: matrix_engine-agentic-toolkit
